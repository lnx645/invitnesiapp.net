<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Halaman Tidak Ditemukan</title>
    <style>
      /* Reset dasar */
      * {
        -webkit-tap-highlight-color: transparent;

        user-select: none;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #09090b; /* zinc-950 */
        color: #f4f4f5; /* zinc-100 */
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      /* Warna seleksi teks */
      ::selection {
        background-color: #a3e635;
        color: #09090b;
      }

      /* Kontainer Utama */
      .error-container {
        background-color: #18181b; /* zinc-900 */
        border: 4px solid #f4f4f5;
        border-radius: 1rem;
        padding: 2rem;
        max-width: 380px;
        width: 100%;
        text-align: center;
        position: relative;
        margin-top: 1rem;
        /* Bayangan Neobrutalism */
        box-shadow: 10px 10px 0px 0px #a3e635;
      }

      /* Label Dekoratif miring */
      .error-badge {
        position: absolute;
        top: -1.25rem;
        right: -1rem;
        background-color: #a3e635;
        color: #09090b;
        padding: 0.25rem 1rem;
        font-weight: 900;
        font-size: 0.875rem;
        border: 4px solid #f4f4f5;
        border-radius: 0.5rem;
        transform: rotate(12deg);
        z-index: 10;
      }

      /* Angka 404 Gradient */
      .error-title {
        font-size: 6rem;
        font-weight: 900;
        letter-spacing: -0.05em;
        margin-bottom: 1rem;
        /* Efek Gradient */
        background: linear-gradient(to bottom right, #f4f4f5, #52525b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .error-subtitle {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      .error-desc {
        color: #a1a1aa; /* zinc-400 */
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      /* Tombol 3D ala Duolingo */
      .btn-3d {
        display: block;
        width: 100%;
        background-color: #a3e635;
        color: #09090b;
        border: 4px solid #f4f4f5;
        border-radius: 0.75rem;
        padding: 1rem 1.5rem;
        font-weight: 900;
        font-size: 1.125rem;
        text-decoration: none;
        /* Efek ketebalan tombol */
        border-bottom-width: 8px;
        transition:
          transform 0.1s,
          border-bottom-width 0.1s,
          background-color 0.2s;
      }

      .btn-3d:hover {
        background-color: #86cb15;
      }

      /* Animasi saat ditekan */
      .btn-3d:active {
        border-bottom-width: 4px;
        transform: translateY(4px);
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="error-badge">ERROR</div>

      <h1 class="error-title">404</h1>
      <h2 class="error-subtitle">Waduh, nyasar ya?</h2>

      <p class="error-desc">
        Halaman atau tautan undangan yang kamu cari tidak ada. Mungkin salah
        ketik atau acaranya sudah selesai.
      </p>

      <a href="/" class="btn-3d"> Kembali ke Beranda </a>
    </div>
  </body>
</html>
